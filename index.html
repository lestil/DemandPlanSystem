<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
<title>需求管理系统 - 完整功能版 | 批量删除 | Jira集成</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f0f2f5;
    font-family:'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
    padding:2rem 1.5rem;
    color:#1e293b;
}

.container{
    max-width:1400px;
    margin:0 auto;
}

.header{
    margin-bottom:2rem;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:1rem;
}

h1{
    font-size:1.8rem;
    font-weight:600;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
}

.sub{
    color:#475569;
    font-size:0.9rem;
    background:#eef2ff;
    padding:0.25rem 0.8rem;
    border-radius:30px;
}

.card{
    background:white;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
    overflow:hidden;
    margin-bottom:2rem;
}

.filter-bar{
    padding:0.8rem 2rem;
    background:#f9fafc;
    border-bottom:1px solid #eef2f6;
    display:flex;
    align-items:center;
    gap:1rem;
    flex-wrap:wrap;
}

.toolbar{
    padding:0.8rem 2rem;
    background:white;
    display:flex;
    align-items:center;
    gap:1rem;
    flex-wrap:wrap;
    border-bottom:1px solid #eef2f6;
}

.btn{
    border:none;
    padding:0.5rem 1.2rem;
    border-radius:40px;
    font-weight:500;
    font-size:0.85rem;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:0.4rem;
    transition:all 0.2s;
}

.btn-primary{
    background:#2563eb;
    color:white;
}

.btn-primary:hover{
    background:#1d4ed8;
}

.btn-danger{
    background:#fee2e2;
    color:#b91c1c;
}

.btn-danger:hover{
    background:#fecaca;
}

.btn-accent{
    background:#10b981;
    color:white;
}

.btn-secondary{
    background:#f1f5f9;
    color:#1e293b;
}

.hospital-select, .search-input{
    padding:0.4rem 1rem;
    border-radius:40px;
    border:1px solid #cbd5e1;
    background:white;
}

.search-input{
    width:220px;
}

.filter-stats{
    font-size:0.75rem;
    background:#eef2ff;
    padding:0.2rem 0.7rem;
    border-radius:30px;
}

.table-wrapper{
    overflow-x:auto;
}

.req-table{
    width:100%;
    border-collapse:collapse;
    font-size:0.85rem;
    min-width:1200px;
}

.req-table th{
    text-align:left;
    padding:1rem 0.8rem;
    background:#f8fafc;
    border-bottom:1px solid #e2e8f0;
    font-weight:600;
    white-space:nowrap;
}

.req-table td{
    padding:0.9rem 0.8rem;
    border-bottom:1px solid #f0f2f7;
    vertical-align:middle;
    background:white;
    max-width:200px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.description-cell{
    max-width:240px;
}

.drag-handle{
    cursor:grab;
    text-align:center;
    font-size:1.2rem;
    color:#94a3b8;
}

.priority-badge,
.status-badge{
    display:inline-block;
    padding:0.2rem 0.7rem;
    border-radius:40px;
    font-size:0.75rem;
    white-space:nowrap;
}

.priority-high{
    background:#fee2e2;
    color:#b91c1c;
}

.priority-medium{
    background:#fff3e3;
    color:#b45309;
}

.priority-low{
    background:#e0f2fe;
    color:#0369a1;
}

.status-completed{
    background:#dcfce7;
    color:#15803d;
}

.status-developing{
    background:#fef9c3;
    color:#854d0e;
}

.status-pending{
    background:#ffe4e2;
    color:#b91c1c;
}

.hospital-badge{
    background:#eef2ff;
    padding:0.2rem 0.5rem;
    border-radius:20px;
    font-size:0.7rem;
    color:#1e40af;
}

.jira-link{
    color:#2563eb;
    cursor:pointer;
    text-decoration:underline dotted;
}

.edit-icon,
.delete-icon{
    cursor:pointer;
    border:none;
    padding:0.3rem 0.6rem;
    border-radius:30px;
    font-size:0.7rem;
}

.edit-icon{
    background:#e6f0ff;
    color:#1e40af;
}

.delete-icon{
    background:#ffe4e4;
    color:#b91c1c;
}

.toast-msg{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#111827;
    color:white;
    padding:0.8rem 1.2rem;
    border-radius:40px;
    z-index:999999;
    display:none;
}

.empty-row td{
    text-align:center;
    padding:3rem;
    color:#94a3b8;
}

.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:99999;
}

.modal-overlay.active{
    display:flex;
}

.modal-container{
    background:white;
    width:90%;
    max-width:700px;
    border-radius:28px;
    box-shadow:0 25px 40px rgba(0,0,0,0.2);
    padding:1.8rem 2rem;
}

.modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:1.5rem;
    font-size:1.4rem;
    font-weight:600;
}

.modal-close{
    background:none;
    border:none;
    font-size:1.8rem;
    cursor:pointer;
}

.modal-form .form-grid{
    display:flex;
    flex-wrap:wrap;
    gap:1rem;
    margin-bottom:1rem;
}

.field-group{
    flex:1;
    min-width:160px;
}

.modal-form label{
    font-size:0.75rem;
    font-weight:500;
    display:block;
    margin-bottom:0.2rem;
}

.modal-form input,
.modal-form select,
.modal-form textarea{
    width:100%;
    padding:0.5rem 0.7rem;
    border:1px solid #cbd5e1;
    border-radius:12px;
    font-size:0.85rem;
}

.modal-footer{
    display:flex;
    justify-content:flex-end;
    gap:0.8rem;
    margin-top:1.5rem;
}

.checkbox-col{
    width:32px;
    text-align:center;
}

footer{
    text-align:center;
    margin-top:2rem;
    color:#6c86a3;
    font-size:0.75rem;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<div>
<h1>🏥 需求排期 · 云端同步版</h1>
<div class="sub">Supabase 多端实时同步 | 批量删除 | Jira集成</div>
</div>
</div>

<div class="card">

<div class="filter-bar">
<span>🏥 医院筛选：</span>
<select id="hospitalFilterSelect" class="hospital-select">
<option value="__ALL__">全部医院</option>
</select>

<span>📌 状态筛选：</span>
<select id="statusFilterSelect" class="hospital-select">
<option value="__ALL__">全部状态</option>
<option value="已完成">已完成</option>
<option value="研发中">研发中</option>
<option value="未完成">未完成</option>
</select>

<span>🔍 全局搜索：</span>
<input type="text" id="globalSearchInput" class="search-input" placeholder="编号/名称/医院/描述">

<span class="filter-stats" id="filterStats"></span>

<div style="flex:1"></div>

<span id="syncStatus" class="filter-stats">☁️ 云端已连接</span>
<button class="btn btn-secondary" id="openJiraSettingsBtn" style="padding:0.3rem 1rem;">⚙️ Jira地址</button>
</div>

<div class="toolbar">
<button class="btn btn-primary" id="openAddModalBtn">➕ 新增需求</button>

<button class="btn btn-danger" id="batchDeleteBtn" style="display:none;">
🗑️ 批量删除
</button>

<button class="btn btn-accent" id="importWordBtn">
📄 导入Word
</button>

<input type="file" id="wordFileInput" accept=".docx" style="display:none;">
</div>

<div class="table-wrapper">
<table class="req-table">

<thead>
<tr>
<th class="checkbox-col">
<input type="checkbox" id="selectAllCheckbox">
</th>
<th>排序</th>
<th>Jira编号</th>
<th>需求名称</th>
<th>项目医院</th>
<th>需求描述</th>
<th>预计完成时间</th>
<th>优先级</th>
<th>状态</th>
<th>操作</th>
</tr>
</thead>

<tbody id="reqTableBody">
<tr class="empty-row">
<td colspan="10">加载中...</td>
</tr>
</tbody>

</table>
</div>
</div>

<footer>
Supabase 云端同步 · 多端实时共享 · 支持批量删除、Jira跳转、全局搜索
</footer>

</div>

<!-- 新增/编辑弹窗 -->
<div id="reqModal" class="modal-overlay">
<div class="modal-container">
<div class="modal-header">
<span id="modalTitle">新增需求</span>
<button class="modal-close" id="closeModalBtn">&times;</button>
</div>
<div class="modal-form">
<div class="form-grid">
<div class="field-group" style="flex:2;">
<label>Jira编号</label>
<input type="text" id="modalJiraKey">
</div>
<div class="field-group">
<label>需求名称</label>
<input type="text" id="modalName">
</div>
</div>
<div class="form-grid">
<div class="field-group">
<label>项目医院</label>
<input type="text" id="modalHospital">
</div>
<div class="field-group">
<label>预计完成时间</label>
<input type="date" id="modalDueDate">
</div>
<div class="field-group">
<label>优先级</label>
<select id="modalPriority">
<option value="高">高</option>
<option value="中" selected>中</option>
<option value="低">低</option>
</select>
</div>
<div class="field-group">
<label>状态</label>
<select id="modalStatus">
<option value="未完成">未完成</option>
<option value="研发中">研发中</option>
<option value="已完成">已完成</option>
</select>
</div>
</div>
<div class="form-grid">
<div class="field-group">
<label>需求描述</label>
<textarea id="modalDesc" rows="3"></textarea>
</div>
</div>
</div>
<div class="modal-footer">
<button class="btn btn-secondary" id="modalCancelBtn">取消</button>
<button class="btn btn-primary" id="modalSaveBtn">保存</button>
</div>
</div>
</div>

<!-- Jira 基础地址设置弹窗 -->
<div id="jiraSettingsModal" class="modal-overlay">
<div class="modal-container" style="max-width:480px;">
<div class="modal-header">
<span>🔗 Jira 基础地址设置</span>
<button class="modal-close" id="closeJiraSettingsBtn">&times;</button>
</div>
<div style="margin-bottom:1rem;">
<label style="font-size:0.8rem;">基础URL (例如: https://your-domain.atlassian.net/browse/)</label>
<input type="text" id="jiraBaseUrlInput" style="width:100%; padding:0.6rem; border-radius:16px; border:1px solid #cbd5e1; margin-top:0.3rem;">
</div>
<div class="modal-footer">
<button class="btn btn-secondary" id="cancelJiraSettingsBtn">取消</button>
<button class="btn btn-primary" id="saveJiraSettingsBtn">保存</button>
</div>
</div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
// Supabase 配置
const SUPABASE_URL = 'https://wphlaqwpvgwozvvqamsp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ODo2XlF5kA7Amtz22I19-w_DMKGM7y9';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 全局变量
let requirements = [];
let currentEditId = null;
let currentFilterHospital = "__ALL__";
let currentFilterStatus = "__ALL__";
let globalSearchKeyword = "";
let jiraBaseUrl = localStorage.getItem('jiraBaseUrl') || "https://jira.atlassian.net/browse/";
let sortableInstance = null;

// DOM 元素
const tableBody = document.getElementById('reqTableBody');
const hospitalFilter = document.getElementById('hospitalFilterSelect');
const statusFilter = document.getElementById('statusFilterSelect');
const globalSearchInput = document.getElementById('globalSearchInput');
const filterStats = document.getElementById('filterStats');
const toast = document.getElementById('toastMsg');
const selectAllCheckbox = document.getElementById('selectAllCheckbox');
const batchDeleteBtn = document.getElementById('batchDeleteBtn');

// 弹窗元素
const reqModal = document.getElementById('reqModal');
const modalTitle = document.getElementById('modalTitle');
const modalJiraKey = document.getElementById('modalJiraKey');
const modalName = document.getElementById('modalName');
const modalHospital = document.getElementById('modalHospital');
const modalDueDate = document.getElementById('modalDueDate');
const modalPriority = document.getElementById('modalPriority');
const modalStatus = document.getElementById('modalStatus');
const modalDesc = document.getElementById('modalDesc');

// Jira设置弹窗
const jiraSettingsModal = document.getElementById('jiraSettingsModal');
const jiraBaseUrlInput = document.getElementById('jiraBaseUrlInput');

// 辅助函数
function showToast(msg, isErr = false) {
    toast.innerText = msg;
    toast.style.display = 'block';
    toast.style.background = isErr ? '#b91c1c' : '#111827';
    setTimeout(() => toast.style.display = 'none', 3000);
}

function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
}

// 获取过滤后的数据（支持医院、状态、全局搜索）
function getFiltered() {
    let result = [...requirements];
    if (currentFilterHospital !== '__ALL__') {
        result = result.filter(r => r.hospital === currentFilterHospital);
    }
    if (currentFilterStatus !== '__ALL__') {
        result = result.filter(r => r.status === currentFilterStatus);
    }
    if (globalSearchKeyword.trim() !== "") {
        const kw = globalSearchKeyword.trim().toLowerCase();
        result = result.filter(r =>
            (r.jira_key && r.jira_key.toLowerCase().includes(kw)) ||
            (r.name && r.name.toLowerCase().includes(kw)) ||
            (r.hospital && r.hospital.toLowerCase().includes(kw)) ||
            (r.description && r.description.toLowerCase().includes(kw))
        );
    }
    return result;
}

function updateStats() {
    filterStats.innerText = `当前 ${getFiltered().length} 条 / 总计 ${requirements.length}`;
}

// 更新医院筛选下拉框
function updateFilterOptions() {
    const hospitals = [...new Set(requirements.map(r => r.hospital).filter(Boolean))];
    hospitalFilter.innerHTML = '<option value="__ALL__">全部医院</option>' +
        hospitals.map(h => `<option value="${h}">${h}</option>`).join('');
    hospitalFilter.value = currentFilterHospital;
    updateStats();
}

// 获取状态样式
function getStatusClass(status) {
    if (status === '已完成') return 'status-completed';
    if (status === '研发中') return 'status-developing';
    return 'status-pending';
}

// 打开Jira链接
function openJira(jiraKey) {
    if (!jiraKey) return;
    let base = jiraBaseUrl.endsWith('/') ? jiraBaseUrl : jiraBaseUrl + '/';
    window.open(base + encodeURIComponent(jiraKey), '_blank');
}

// 刷新表格显示
function refreshView() {
    const filtered = getFiltered();
    if (!filtered.length) {
        tableBody.innerHTML = '<tr class="empty-row"><td colspan="10">暂无数据</td></tr>';
        updateBatchDeleteButton();
        return;
    }
    let html = '';
    for (const req of filtered) {
        html += `
        <tr data-id="${req.id}">
            <td class="checkbox-col"><input type="checkbox" class="row-checkbox" data-id="${req.id}"></td>
            <td class="drag-handle">⋮⋮</td>
            <td><span class="jira-link" data-jira-key="${escapeHtml(req.jira_key)}">${escapeHtml(req.jira_key)}</span></td>
            <td title="${escapeHtml(req.name)}">${escapeHtml(req.name)}</td>
            <td><span class="hospital-badge">${escapeHtml(req.hospital)}</span></td>
            <td class="description-cell" title="${escapeHtml(req.description || '')}">${escapeHtml(req.description || '—')}</td>
            <td>${escapeHtml(req.due_date || '')}</td>
            <td><span class="priority-badge priority-${req.priority === '高' ? 'high' : (req.priority === '中' ? 'medium' : 'low')}">${escapeHtml(req.priority)}</span></td>
            <td><span class="status-badge ${getStatusClass(req.status)}">${escapeHtml(req.status)}</span></td>
            <td><button class="edit-icon" data-id="${req.id}">编辑</button> <button class="delete-icon" data-id="${req.id}">删除</button></td>
        </tr>`;
    }
    tableBody.innerHTML = html;
    // 绑定Jira链接点击事件
    document.querySelectorAll('.jira-link').forEach(el => {
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            openJira(el.getAttribute('data-jira-key'));
        });
    });
    initSortable();
    updateStats();
    updateBatchDeleteButton();
}

// 批量删除 UI
function updateBatchDeleteButton() {
    const checked = document.querySelectorAll('.row-checkbox:checked').length;
    batchDeleteBtn.style.display = checked > 0 ? 'inline-flex' : 'none';
    batchDeleteBtn.innerText = `🗑️ 批量删除 (${checked})`;
}

function getSelectedIds() {
    return Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb => parseInt(cb.dataset.id));
}

async function batchDelete() {
    const ids = getSelectedIds();
    if (ids.length === 0) return;
    if (!confirm(`确定删除 ${ids.length} 个需求吗？`)) return;
    for (const id of ids) {
        await supabaseClient.from('requirements').delete().eq('id', id);
    }
    showToast(`已删除 ${ids.length} 条需求`);
    loadRequirements();
}

async function deleteSingleRequirement(id) {
    if (!confirm('确认删除？')) return;
    await supabaseClient.from('requirements').delete().eq('id', id);
    showToast('删除成功');
    loadRequirements();
}

// 保存需求（新增或编辑）
async function saveRequirement() {
    const jira_key = modalJiraKey.value.trim();
    const name = modalName.value.trim();
    const hospital = modalHospital.value.trim();
    const due_date = modalDueDate.value;
    const priority = modalPriority.value;
    const status = modalStatus.value;
    const description = modalDesc.value.trim();

    if (!jira_key || !name || !hospital) {
        showToast('请填写完整信息', true);
        return;
    }

    const payload = { jira_key, name, hospital, due_date, priority, status, description };

    if (currentEditId) {
        const { error } = await supabaseClient.from('requirements').update(payload).eq('id', currentEditId);
        if (error) { showToast('更新失败', true); return; }
        showToast('更新成功');
    } else {
        payload.id = Date.now();
        payload.order_index = requirements.length;
        const { error } = await supabaseClient.from('requirements').insert(payload);
        if (error) { showToast('新增失败', true); return; }
        showToast('新增成功');
    }
    closeModal();
    loadRequirements();
}

// 弹窗控制
function openModal(edit = false, data = null) {
    reqModal.classList.add('active');
    if (edit && data) {
        currentEditId = data.id;
        modalTitle.innerText = '编辑需求';
        modalJiraKey.value = data.jira_key;
        modalName.value = data.name;
        modalHospital.value = data.hospital;
        modalDueDate.value = data.due_date || '';
        modalPriority.value = data.priority;
        modalStatus.value = data.status;
        modalDesc.value = data.description || '';
    } else {
        currentEditId = null;
        modalTitle.innerText = '新增需求';
        modalJiraKey.value = '';
        modalName.value = '';
        modalHospital.value = '';
        modalDueDate.value = '';
        modalPriority.value = '中';
        modalStatus.value = '未完成';
        modalDesc.value = '';
    }
}

function closeModal() {
    reqModal.classList.remove('active');
}

// Jira设置弹窗
function openJiraSettingsModal() {
    jiraBaseUrlInput.value = jiraBaseUrl;
    jiraSettingsModal.classList.add('active');
}
function closeJiraSettingsModal() {
    jiraSettingsModal.classList.remove('active');
}
function saveJiraUrl() {
    let newUrl = jiraBaseUrlInput.value.trim();
    if (newUrl && !newUrl.endsWith('/')) newUrl += '/';
    if (newUrl) {
        jiraBaseUrl = newUrl;
        localStorage.setItem('jiraBaseUrl', jiraBaseUrl);
        showToast('Jira地址已保存');
        closeJiraSettingsModal();
    } else {
        showToast('无效地址', true);
    }
}

// 拖拽排序
function initSortable() {
    if (sortableInstance) sortableInstance.destroy();
    sortableInstance = new Sortable(tableBody, {
        handle: '.drag-handle',
        animation: 200,
        async onEnd() {
            const ids = [...tableBody.querySelectorAll('tr')].map(tr => parseInt(tr.dataset.id)).filter(Boolean);
            for (let i = 0; i < ids.length; i++) {
                await supabaseClient.from('requirements').update({ order_index: i }).eq('id', ids[i]);
            }
            loadRequirements();
        }
    });
}

// Word导入
async function importWord(file) {
    try {
        const ab = await file.arrayBuffer();
        const result = await mammoth.convertToHtml({ arrayBuffer: ab });
        const parser = new DOMParser();
        const doc = parser.parseFromString(result.value, 'text/html');
        const rows = doc.querySelectorAll('table tr');
        if (rows.length < 2) { showToast('Word无有效数据', true); return; }
        let count = 0;
        for (let i = 1; i < rows.length; i++) {
            const cells = rows[i].querySelectorAll('td');
            if (cells.length < 3) continue;
            const hospital = cells[0].innerText.trim();
            const name = cells[1].innerText.trim();
            const description = cells[2].innerText.trim();
            if (!hospital || !name) continue;
            await supabaseClient.from('requirements').insert({
                id: Date.now() + i,
                jira_key: 'IMPORT-' + (Date.now() + i),
                name,
                hospital,
                description,
                due_date: new Date().toISOString().slice(0, 10),
                priority: '中',
                status: '未完成',
                order_index: requirements.length + i
            });
            count++;
        }
        showToast(`导入 ${count} 条`);
        loadRequirements();
    } catch (e) {
        console.error(e);
        showToast('导入失败', true);
    }
}

// 从云端加载数据
async function loadRequirements() {
    const { data, error } = await supabaseClient.from('requirements').select('*').order('order_index', { ascending: true });
    if (error) {
        console.error(error);
        showToast('加载失败', true);
        return;
    }
    requirements = data || [];
    updateFilterOptions();
    refreshView();
}

// 事件绑定
document.getElementById('openAddModalBtn').onclick = () => openModal();
document.getElementById('closeModalBtn').onclick = closeModal;
document.getElementById('modalCancelBtn').onclick = closeModal;
document.getElementById('modalSaveBtn').onclick = saveRequirement;

hospitalFilter.onchange = (e) => {
    currentFilterHospital = e.target.value;
    refreshView();
};
statusFilter.onchange = (e) => {
    currentFilterStatus = e.target.value;
    refreshView();
};
globalSearchInput.oninput = (e) => {
    globalSearchKeyword = e.target.value;
    refreshView();
};

document.getElementById('importWordBtn').onclick = () => document.getElementById('wordFileInput').click();
document.getElementById('wordFileInput').onchange = (e) => {
    if (e.target.files[0]) importWord(e.target.files[0]);
};

batchDeleteBtn.onclick = batchDelete;
selectAllCheckbox.onchange = (e) => {
    const isChecked = e.target.checked;
    document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = isChecked);
    updateBatchDeleteButton();
};

document.getElementById('openJiraSettingsBtn').onclick = openJiraSettingsModal;
document.getElementById('closeJiraSettingsBtn').onclick = closeJiraSettingsModal;
document.getElementById('cancelJiraSettingsBtn').onclick = closeJiraSettingsModal;
document.getElementById('saveJiraSettingsBtn').onclick = saveJiraUrl;

// 事件委托处理编辑/删除点击
document.addEventListener('click', (e) => {
    if (e.target.classList.contains('edit-icon')) {
        const id = parseInt(e.target.dataset.id);
        const req = requirements.find(r => r.id === id);
        if (req) openModal(true, req);
    }
    if (e.target.classList.contains('delete-icon')) {
        deleteSingleRequirement(parseInt(e.target.dataset.id));
    }
});

// 实时订阅
supabaseClient.channel('requirements-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'requirements' }, () => {
        loadRequirements();
    })
    .subscribe();

// 启动
loadRequirements();
</script>
